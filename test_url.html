<!DOCTYPE html>
<html>

<body>
    <script>
        const AuthService = {
            basePath: '',
            getAbsoluteUrl: function (relativePath) {
                if (relativePath.startsWith('http')) return relativePath;

                let origin = window.location.origin;
                if (!origin) origin = window.location.protocol + "//" + window.location.hostname + (window.location.port ? ':' + window.location.port : '');

                let pathArray = window.location.pathname.split('/');
                pathArray.pop();

                let parts = (this.basePath + relativePath).split('/');

                for (let part of parts) {
                    if (part === '') continue;
                    if (part === '.') continue;
                    if (part === '..') {
                        pathArray.pop();
                    } else {
                        pathArray.push(part);
                    }
                }

                return origin + pathArray.join('/');
            }
        };

        let output = "";
        AuthService.basePath = '../';
        output += "<b>FROM basePath='../':</b><br>";
        output += "Redirect to index.html -> " + AuthService.getAbsoluteUrl('index.html') + "<br>";
        output += "Redirect to login.html -> " + AuthService.getAbsoluteUrl('login.html') + "<br><br>";

        AuthService.basePath = '';
        output += "<b>FROM basePath='':</b><br>";
        output += "Redirect to dashboard.html -> " + AuthService.getAbsoluteUrl('dashboard.html') + "<br>";

        document.body.innerHTML = output;
    </script>
</body>

</html>
