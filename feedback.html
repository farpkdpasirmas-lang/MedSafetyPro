<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maklumbalas - MedSafety Pro</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="Medication Error Reporting System for PKD Pasir Mas">
    <meta name="theme-color" content="#0d9488">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192.png">

    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/ui.js"></script>

    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
    <script src="js/pdf_generator.js"></script>
    
    <!-- Database Service -->
    <!-- Make sure Firebase is loaded first if using Firebase DB -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/db.js"></script>

    <!-- Admin Notifications -->
    <script src="js/notifications.js"></script>

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>
    <div id="app"></div>

    <script>
        AuthService.requireAuth();

        document.addEventListener('DOMContentLoaded', async () => {
            Components.renderLayout('app', 'feedback', 'Maklumbalas');

            const urlParams = new URLSearchParams(window.location.search);
            const reportId = urlParams.get('reportId');
            const currentUser = AuthService.getCurrentUser();
            const mainBody = document.getElementById('main-body');

            // Paparkan status memuatkan (loading) untuk mengelakkan skrin putih jika capaian pangkalan data perlahan
            mainBody.innerHTML = `
                <div class="card" style="text-align: center; padding: 4rem 2rem;">
                    <div style="display: inline-block; width: 50px; height: 50px; border: 4px solid #f1f5f9; border-top: 4px solid var(--color-primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1.5rem;"></div>
                    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
                    <h2 style="color: var(--color-text-main); margin-bottom: 0.5rem;">Memuatkan Maklumat...</h2>
                    <p style="color: var(--color-text-muted);">Sila tunggu sebentar sementara sistem menyemak pangkalan data.</p>
                </div>
            `;

            if (!reportId) {
                // Fetch user's reports
                try {
                    const allReports = await DB.getAllReports();
                    const userReports = allReports.filter(r => r.staffEmail === currentUser.email);
                    const feedbacks = JSON.parse(localStorage.getItem('medsafety_feedback_db') || '[]');
                    const submittedReportIds = new Set(feedbacks.filter(f => f.submittedEmail === currentUser.email).map(f => f.reportId));

                    if (userReports.length === 0) {
                        mainBody.innerHTML = `
                            <div class="card" style="text-align: center; padding: 3rem;">
                                <h2 style="color: var(--color-text-main); margin-bottom: 1rem;">Senarai Maklumbalas</h2>
                                <p>Tiada laporan kesilapan pengubatan yang memerlukan maklumbalas anda buat masa ini.</p>
                                <a href="dashboard.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">Kembali ke Papan Pemuka</a>
                            </div>
                        `;
                        return;
                    }

                    const getBadge = (outcome) => {
                        if (!outcome) return 'secondary';
                        const lower = outcome.toLowerCase();
                        if (lower.includes('no harm')) return 'warning';
                        if (lower.includes('harm')) return 'danger';
                        if (lower.includes('no error')) return 'success';
                        return 'primary';
                    };

                    // Build table
                    let tableRows = userReports.map(r => {
                        const dateObj = new Date(r.timestamp);
                        const dateDisplay = isNaN(dateObj.getTime()) ? '-' : dateObj.toLocaleDateString('en-GB');
                        const isSubmitted = submittedReportIds.has(r.id);
                        
                        return `
                            <tr style="border-bottom: 1px solid #e2e8f0;">
                                <td style="padding: 1rem;">${dateDisplay}</td>
                                <td style="padding: 1rem; font-family: monospace; font-weight: bold; color: #10b981;">${r.serialNumber || '-'}</td>
                                <td style="padding: 1rem;">${r.facility || '-'}</td>
                                <td style="padding: 1rem;"><span class="badge badge-${getBadge(r.outcome)}">${r.outcome || '-'}</span></td>
                                <td style="padding: 1rem;">
                                    ${isSubmitted 
                                        ? `<span class="badge" style="background:#d1fae5; color:#065f46; font-size: 0.875rem;">✅ Selesai</span>` 
                                        : `<a href="feedback.html?reportId=${r.id}" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Beri Maklumbalas</a>`
                                    }
                                </td>
                            </tr>
                        `;
                    }).join('');

                    mainBody.innerHTML = `
                        <div class="card">
                            <h2 style="margin-bottom: 1.5rem; color: var(--color-text-main);">Senarai Laporan Kesilapan</h2>
                            <p style="color: var(--color-text-muted); margin-bottom: 1.5rem;">
                                Berikut adalah senarai laporan yang melibatkan anda. Sila berikan maklumbalas bagi laporan yang masih berstatus tertunggak.
                            </p>
                            <div style="overflow-x: auto;">
                                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                                    <thead>
                                        <tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                                            <th style="padding: 1rem; font-weight: 600;">Tarikh</th>
                                            <th style="padding: 1rem; font-weight: 600;">No. Siri</th>
                                            <th style="padding: 1rem; font-weight: 600;">Fasiliti</th>
                                            <th style="padding: 1rem; font-weight: 600;">Outcome</th>
                                            <th style="padding: 1rem; font-weight: 600;">Tindakan</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${tableRows}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                } catch (error) {
                    console.error("Error loading user reports:", error);
                    mainBody.innerHTML = `
                        <div class="card" style="text-align: center; padding: 3rem;">
                            <h2 style="color: #ef4444; margin-bottom: 1rem;">Ralat</h2>
                            <p>Gagal memuatkan senarai laporan. Sila cuba lagi kemudian.</p>
                            <a href="dashboard.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">Kembali ke Papan Pemuka</a>
                        </div>
                    `;
                }
                return;
            }

            try {
                // Fetch the report details to verify authorization
                const reportData = await DB.getReportById(reportId);
                
                if (!reportData) {
                    mainBody.innerHTML = `
                        <div class="card" style="text-align: center; padding: 3rem;">
                            <h2 style="color: #ef4444; margin-bottom: 1rem;">Laporan Tidak Dijumpai</h2>
                            <p>Laporan dengan ID tersebut (<strong>${reportId}</strong>) tiada di dalam sistem.</p>
                            <a href="dashboard.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">Kembali ke Papan Pemuka</a>
                        </div>
                    `;
                    return;
                }

                // Verify the user
                const isAuthorizedUser = reportData.staffEmail === currentUser.email;
                const isAdmin = currentUser.role === 'admin' || currentUser.isAdmin === true;
                
                if (!isAuthorizedUser && !isAdmin) {
                    mainBody.innerHTML = `
                        <div class="card" style="text-align: center; padding: 3rem;">
                            <h2 style="color: #ef4444; margin-bottom: 1rem;">Akses Ditolak</h2>
                            <p style="margin-bottom: 1rem;">Anda <strong>tidak dibenarkan</strong> menghantar maklumbalas untuk laporan ini.</p>
                            <p style="color: #666; font-size: 0.9rem;">Hanya individu yang disenaraikan dalam kesilapan pengubatan tersebut (<strong style="color: #333;">${reportData.staffEmail}</strong>) sahaja yang boleh mengakses borang ini.</p>
                            <a href="dashboard.html" class="btn btn-primary" style="margin-top: 2rem; display: inline-block;">Kembali ke Papan Pemuka</a>
                        </div>
                    `;
                    return;
                }

                // If authorized, show the normal form
                let reportBanner = '';
                if (reportId) {
                    reportBanner = `
                        <div style="background-color: #f0fdf4; color: #166534; padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; border: 1px solid #bbf7d0; display: flex; align-items: center; gap: 0.75rem;">
                            <span style="font-size: 1.25rem;">📄</span>
                            <div>
                                <strong>Menyediakan Maklumbalas untuk ID Laporan:</strong> ${reportId}
                                <div style="font-size: 0.85rem; margin-top: 0.25rem;">Maklumbalas ini akan dikaitkan dengan laporan yang dinyatakan.</div>
                            </div>
                        </div>
                    `;
                }

                mainBody.innerHTML = `
                    <div class="card">
                        <h2 style="margin-bottom: 1.5rem; color: var(--color-text-main);">Faktor Penyumbang Kesilapan</h2>
                        ${reportBanner}

                        <!-- Pre-requisite: Download PDF Section -->
                        <div id="download-section" style="text-align: center; padding: 2rem; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: var(--radius-md); margin-bottom: 2rem;">
                            <h3 style="color: #334155; margin-bottom: 1rem;">Langkah 1: Semak Laporan Asal</h3>
                            <p style="color: var(--color-text-muted); margin-bottom: 1.5rem;">Sila muat turun dan semak laporan kesilapan pengubatan sebelum memberikan maklum balas anda.</p>
                            <button id="downloadPdfBtn" class="btn btn-primary" style="font-size: 1.1rem; padding: 0.75rem 1.5rem;">
                                ⬇️ Muat Turun Laporan PDF
                            </button>
                        </div>

                        <!-- Feedback Form (Hidden Initially) -->
                        <div id="form-container" style="display: none;">
                            <h3 style="color: #334155; margin-bottom: 1rem; padding-top: 1rem; border-top: 1px solid #e2e8f0;">Langkah 2: Berikan Maklum Balas</h3>
                            <p style="color: var(--color-text-muted); margin-bottom: 2rem;">
                                Sila tandakan faktor-faktor yang berkaitan dan berikan penerangan ringkas bagi setiap faktor yang dipilih.
                            </p>

                            <form id="feedback-form" style="display: flex; flex-direction: column; gap: 2rem;">
                                
                                <!-- Staff Factor -->
                                <div class="factor-section">
                                    <label class="factor-checkbox">
                                        <input type="checkbox" name="factor" value="staff" onchange="toggleExplanation('staff')">
                                        <span class="factor-label">Faktor Kakitangan</span>
                                    </label>
                                    <div id="staff-explanation" class="explanation-box" style="display: none;">
                                        <label for="staff-text">Penerangan:</label>
                                        <textarea id="staff-text" name="staff-explanation" rows="3" placeholder="Sila berikan penerangan ringkas mengenai faktor kakitangan..."></textarea>
                                    </div>
                                </div>

                                <!-- Medication Related -->
                                <div class="factor-section">
                                    <label class="factor-checkbox">
                                        <input type="checkbox" name="factor" value="medication" onchange="toggleExplanation('medication')">
                                        <span class="factor-label">Berkaitan Ubat</span>
                                    </label>
                                    <div id="medication-explanation" class="explanation-box" style="display: none;">
                                        <label for="medication-text">Penerangan:</label>
                                        <textarea id="medication-text" name="medication-explanation" rows="3" placeholder="Sila berikan penerangan ringkas mengenai faktor ubat..."></textarea>
                                    </div>
                                </div>

                                <!-- Task & Technology -->
                                <div class="factor-section">
                                    <label class="factor-checkbox">
                                        <input type="checkbox" name="factor" value="task" onchange="toggleExplanation('task')">
                                        <span class="factor-label">Tugas & Teknologi</span>
                                    </label>
                                    <div id="task-explanation" class="explanation-box" style="display: none;">
                                        <label for="task-text">Penerangan:</label>
                                        <textarea id="task-text" name="task-explanation" rows="3" placeholder="Sila berikan penerangan ringkas mengenai faktor panduan tugas dan rujukan..."></textarea>
                                    </div>
                                </div>

                                <!-- Work Environment -->
                                <div class="factor-section">
                                    <label class="factor-checkbox">
                                        <input type="checkbox" name="factor" value="environment" onchange="toggleExplanation('environment')">
                                        <span class="factor-label">Persekitaran Tempat Kerja</span>
                                    </label>
                                    <div id="environment-explanation" class="explanation-box" style="display: none;">
                                        <label for="environment-text">Penerangan:</label>
                                        <textarea id="environment-text" name="environment-explanation" rows="3" placeholder="Sila berikan penerangan ringkas mengenai faktor persekitaran kerja..."></textarea>
                                    </div>
                                </div>

                                <!-- Team Factors -->
                                <div class="factor-section">
                                    <label class="factor-checkbox">
                                        <input type="checkbox" name="factor" value="team" onchange="toggleExplanation('team')">
                                        <span class="factor-label">Faktor Pasukan</span>
                                    </label>
                                    <div id="team-explanation" class="explanation-box" style="display: none;">
                                        <label for="team-text">Penerangan:</label>
                                        <textarea id="team-text" name="team-explanation" rows="3" placeholder="Sila berikan penerangan ringkas mengenai faktor pasukan..."></textarea>
                                    </div>
                                </div>

                                <!-- Others -->
                                <div class="factor-section">
                                    <label class="factor-checkbox">
                                        <input type="checkbox" name="factor" value="others" onchange="toggleExplanation('others')">
                                        <span class="factor-label">Lain-lain</span>
                                    </label>
                                    <div id="others-explanation" class="explanation-box" style="display: none;">
                                        <label for="others-text">Penerangan:</label>
                                        <textarea id="others-text" name="others-explanation" rows="3" placeholder="Sila berikan penerangan ringkas mengenai faktor penyumbang lain..."></textarea>
                                    </div>
                                </div>

                                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                                    <button type="submit" class="btn btn-primary" id="submitBtn">Hantar Maklumbalas</button>
                                    <button type="reset" class="btn btn-outline" onclick="resetForm()">Tetapkan Semula</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <style>
                        .factor-section {
                            padding: 1.5rem;
                            background: #f8fafc;
                            border-radius: var(--radius-md);
                            border-left: 4px solid var(--color-primary);
                        }

                        .factor-checkbox {
                            display: flex;
                            align-items: center;
                            gap: 0.75rem;
                            cursor: pointer;
                            font-size: 1rem;
                        }

                        .factor-checkbox input[type="checkbox"] {
                            width: 20px;
                            height: 20px;
                            cursor: pointer;
                        }

                        .factor-label {
                            font-weight: 600;
                            color: var(--color-text-main);
                            font-size: 1.1rem;
                        }

                        .explanation-box {
                            margin-top: 1rem;
                            padding: 1rem;
                            background: white;
                            border-radius: var(--radius-md);
                            border: 1px solid #e2e8f0;
                        }

                        .explanation-box label {
                            display: block;
                            font-weight: 500;
                            color: var(--color-text-main);
                            margin-bottom: 0.5rem;
                        }

                        .explanation-box textarea {
                            width: 100%;
                            padding: 0.75rem;
                            border: 1px solid #e2e8f0;
                            border-radius: var(--radius-md);
                            font-family: inherit;
                            font-size: 0.875rem;
                            resize: vertical;
                            transition: border-color 0.2s;
                        }

                        .explanation-box textarea:focus {
                            outline: none;
                            border-color: var(--color-primary);
                        }
                    </style>
                `;

                // Add Check PDF Button Listener
                document.getElementById('downloadPdfBtn').addEventListener('click', async () => {
                    const btn = document.getElementById('downloadPdfBtn');
                    btn.disabled = true;
                    btn.textContent = 'Menjana PDF...';
                    
                    try {
                        if (window.PDFService && reportData) {
                            await PDFService.generatePDF(reportData);
                            
                            // Unhide the form after successful download
                            document.getElementById('form-container').style.display = 'block';
                            
                            // Update Button to indicate success
                            btn.textContent = '✅ Berjaya Dimuat Turun (Muat Turun Semula)';
                            btn.classList.replace('btn-primary', 'btn-outline');
                        } else {
                            throw new Error("PDF Service missing");
                        }
                    } catch (error) {
                        console.error('Error generating PDF:', error);
                        alert('Gagal memuat turun PDF. Sila cuba lagi atau hubungi admin.');
                    } finally {
                        btn.disabled = false;
                    }
                });

                // ============= EmailJS Configuration =============
                // IMPORTANT: Replace these with your actual EmailJS credentials
                // See EMAILJS_SETUP.md for detailed setup instructions
                const EMAILJS_CONFIG = {
                    publicKey: 'YOUR_PUBLIC_KEY',      // Replace with your Public Key from EmailJS dashboard
                    serviceId: 'YOUR_SERVICE_ID',      // Replace with your Service ID
                    templateId: 'YOUR_TEMPLATE_ID'     // Replace with your Template ID
                };

                // Initialize EmailJS
                if (typeof emailjs !== 'undefined' && EMAILJS_CONFIG.publicKey !== 'YOUR_PUBLIC_KEY') {
                    emailjs.init(EMAILJS_CONFIG.publicKey);
                }

                // Form submission handler
                document.getElementById('feedback-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('submitBtn').textContent = 'Menghantar...';

                    const formData = {
                        id: Date.now().toString(),
                        reportId: reportId,
                        submittedBy: currentUser.fullname,
                        submittedEmail: currentUser.email,
                        submittedAt: new Date().toISOString(),
                        factors: []
                    };

                    // Collect checked factors and their explanations
                    const checkboxes = document.querySelectorAll('input[name="factor"]:checked');
                    checkboxes.forEach(checkbox => {
                        const factorType = checkbox.value;
                        const explanation = document.getElementById(`${factorType}-text`).value;

                        formData.factors.push({
                            type: factorType,
                            label: checkbox.nextElementSibling.textContent,
                            explanation: explanation
                        });
                    });

                    if (formData.factors.length === 0) {
                        alert('Sila pilih sekurang-kurangnya satu faktor penyumbang.');
                        document.getElementById('submitBtn').disabled = false;
                        document.getElementById('submitBtn').textContent = 'Hantar Maklumbalas';
                        return;
                    }

                    // Validate that all selected factors have explanations
                    const missingExplanation = formData.factors.find(f => !f.explanation.trim());
                    if (missingExplanation) {
                        alert(`Sila berikan penerangan untuk ${missingExplanation.label}.`);
                        document.getElementById('submitBtn').disabled = false;
                        document.getElementById('submitBtn').textContent = 'Hantar Maklumbalas';
                        return;
                    }

                    // Save to localStorage
                    const feedbacks = JSON.parse(localStorage.getItem('medsafety_feedback_db') || '[]');
                    feedbacks.push(formData);
                    localStorage.setItem('medsafety_feedback_db', JSON.stringify(feedbacks));

                    // Send email notification via EmailJS
                    if (typeof emailjs !== 'undefined' && EMAILJS_CONFIG.publicKey !== 'YOUR_PUBLIC_KEY') {
                        try {
                            // Prepare email template parameters
                            const factorsList = formData.factors.map(f => f.label).join(', ');
                            const templateParams = {
                                report_id: formData.reportId || 'Not specified',
                                user_name: formData.submittedBy,
                                user_email: formData.submittedEmail || 'Not provided',
                                submission_date: new Date(formData.submittedAt).toLocaleString('en-MY', {
                                    dateStyle: 'full',
                                    timeStyle: 'short'
                                }),
                                factors_list: factorsList,
                                staff_explanation: '',
                                medication_explanation: '',
                                task_explanation: '',
                                environment_explanation: '',
                                team_explanation: '',
                                others_explanation: ''
                            };

                            // Add explanations for selected factors
                            formData.factors.forEach(factor => {
                                switch (factor.type) {
                                    case 'staff':
                                        templateParams.staff_explanation = factor.explanation;
                                        break;
                                    case 'medication':
                                        templateParams.medication_explanation = factor.explanation;
                                        break;
                                    case 'task':
                                        templateParams.task_explanation = factor.explanation;
                                        break;
                                    case 'environment':
                                        templateParams.environment_explanation = factor.explanation;
                                        break;
                                    case 'team':
                                        templateParams.team_explanation = factor.explanation;
                                        break;
                                    case 'others':
                                        templateParams.others_explanation = factor.explanation;
                                        break;
                                }
                            });

                            // Send email
                            await emailjs.send(
                                EMAILJS_CONFIG.serviceId,
                                EMAILJS_CONFIG.templateId,
                                templateParams
                            );

                        } catch (error) {
                            console.error('Email sending failed:', error);
                        }
                    } else {
                        // EmailJS not configured
                        if (EMAILJS_CONFIG.publicKey === 'YOUR_PUBLIC_KEY') {
                            console.warn('EmailJS not configured. Please update EMAILJS_CONFIG in feedback.html');
                        }
                    }

                    alert('Maklumbalas berjaya dihantar! Terima kasih atas kerjasama anda.');
                    
                    // Redirect back to dashboard after a short delay
                    setTimeout(() => {
                        window.location.replace('dashboard.html');
                    }, 1500);
                });

                // Attach to window so onchange handlers can reach it
                window.toggleExplanation = function(factorType) {
                    const explanationBox = document.getElementById(`${factorType}-explanation`);
                    const checkbox = document.querySelector(`input[value="${factorType}"]`);

                    if (checkbox.checked) {
                        explanationBox.style.display = 'block';
                    } else {
                        explanationBox.style.display = 'none';
                        document.getElementById(`${factorType}-text`).value = '';
                    }
                };

                window.resetForm = function() {
                    // Hide all explanation boxes
                    const explanationBoxes = document.querySelectorAll('.explanation-box');
                    explanationBoxes.forEach(box => {
                        box.style.display = 'none';
                    });
                };

            } catch (error) {
                console.error('Error loading report for feedback:', error);
                mainBody.innerHTML = `
                    <div class="card" style="text-align: center; padding: 3rem;">
                        <h2 style="color: #ef4444; margin-bottom: 1rem;">Ralat Sistem</h2>
                        <p>Terdapat ralat teknikal semasa cuba memuatkan pangkalan data. Sila pastikan anda mempunyai akses internet yang stabil.</p>
                        <a href="dashboard.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">Kembali ke Papan Pemuka</a>
                    </div>
                `;
            }
        });

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
